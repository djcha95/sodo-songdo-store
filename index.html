<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/png" href="/sodomall-logo.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sodomall</title>

    <meta property="og:title" content="소도몰 - 초특가 공동구매마켓" />
    <meta property="og:description" content="소비자도 도매가로!" />
    <meta property="og:image" content="https://www.sodo-songdo.store/sodomall_wel.png" />
    <meta property="og:url" content="https://www.sodo-songdo.store/" />
    <meta property="og:site_name" content="소도몰" />
    <meta property="og:type" content="website" />
    
    <!-- ✅ [추가] 폰트 프리로딩: 텍스트가 표시되기 전에 폰트 파일을 미리 다운로드하여
         레이아웃 시프트(CLS)를 방지하고 텍스트 표시 속도를 개선합니다. -->
    <link rel="preload" href="/fonts/Pretendard-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/Pretendard-Bold.woff2" as="font" type="font/woff2" crossorigin>

    <script 
      type="text/javascript" 
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d3d9ad6394a41f92ce4bb276a0448a6f&autoload=false"
    ></script>
    
    <style>
      /* ✅ [추가] Critical CSS: 초기 로딩 스피너 및 핵심 레이아웃 스타일 */
      /* 이 스타일들은 사용자가 앱을 보는 순간부터 즉시 적용되어
         로딩 중에도 화면이 깨지지 않고 자연스럽게 전환되도록 돕습니다. */
      #app-loading-indicator {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f8f9fa;
        z-index: 9999;
      }
      .initial-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(0, 0, 0, 0.1);
        border-left-color: #4B8B3B; /* Primary color */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* 여기에 앱의 헤더, 기본 배경색 등 최소한의 레이아웃 CSS를 추가합니다. */
      body { margin: 0; background-color: #fff; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading-indicator">
        <div class="initial-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
